# This is not a valid configuration file.
# Don't use it.

storage: /tmp/lego/
networkStack: ipv6only
userAgent: foo

servers:
  myserver:
    url: https://example.com
    overallRequestLimit: 18
    tlsSkipVerify: true
    httpTimeout: 0
    certTimeout: 30

accounts:
  foo:
    server: https://example.com
    email: foo@example.com
    keyType: RSA2048
    acceptsTermsOfService: true
    eab:
      kid: foo
      hmacKey: foo

challenges:
  one:
    http:
      address: ":80"
      delay: 0s
      proxyHeader: Host
      webroot: /tmp/webroot
      memcachedHosts:
        - memcached:11211
      s3Bucket: 's3-bucket'
  two:
    tls:
      address: ":443"
      delay: 0s
  three:
    dns:
      provider: cloudflare
      envFile: /tmp/secrets/.env.cf
      propagation:
        disableAuthoritativeNameservers: true
        disableRecursiveNameservers: true
        wait: 0s
      dnsTimeout: 10
      resolvers:
        - 1.1.1.1:53
  four:
    dnsPersist:
      issuerDomainName: example.com
      persistUntil: 2020-01-01T00:00:00Z
      propagation:
        disableAuthoritativeNameservers: true
        disableRecursiveNameservers: true
        wait: 0s

certificates:
  foo: # when a section is removed, clean/archive the related files.
    challenge: one
    account: foo
    keyType: RSA2048 # if not set, use the account keyType
    domains:
      - example.com
      - '*.example.com'
    csr: /tmp/foo.csr
    preferredChain: "ISRG Root X1"
    profile: "tls"
    enableCommonName: true
    notBefore: ""
    notAfter: ""
    noBundle: false
    mustStaple: false
    alwaysDeactivateAuthorizations: false
    renew:
      reuseKey: true
      days: 1
      disableRandomSleep: true
      ari:
        disable: false
        waitToRenewDuration: 1m
    pfx:
      password: xxx
      format: SHA256

hooks:
  pre:
    command: "./my-pre-hook.sh"
    timeout: 3s
  deploy:
    command: "./my-deploy-hook.sh"
    timeout: 3s
  post:
    command: "./my-post-hook.sh"
    timeout: 3s

log:
  level: debug
  format: text
