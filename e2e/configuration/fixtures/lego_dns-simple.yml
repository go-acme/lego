challenges:
  mychallenge:
    dns:
      provider: exec
      propagation:
        wait: 500ms
      resolvers:
        - :8853
      envFile: ./fixtures/.env.lego.mychallenge

certificates:
  'dns.localhost':
    domains:
      - dns.localhost
      - '*.dns.localhost'

accounts:
